<app-project-arrow />
@if (bookListQuery.isLoading()) {
  <p>page loading ...</p>
}
<div class="book-container">
  <div class="book-list-header">
  <h1>Book List</h1>
  <div class="search-container">
  <input type="text" #search [(ngModel)]="searchTerm" placeholder="Search by author or title..."/>
  <app-search-icon class="search-icon" />
  </div>
    </div>
  <label for="status">Read Status: </label>

  <select [(ngModel)]="statusFilter">
    <option value="">All</option>
    <option value="not started">Not Started</option>
    <option value="in progress">In Progress</option>
    <option value="completed">Completed</option>
  </select>
  @for (book of bookList(); track book.id) {
    <div class="book-card">
      <div class="book-icons">
        <span (click)="deleteBook(book)"> <app-trashcan /> </span>
        <span (click)="editBook(book)"><app-pen-edit /></span>
      </div>
      <div class="book-header" (click)="toggleExpanded(book.id!)">
        <h2>{{ book.book }}</h2>


        <span class="chevron" [class.open]="expanded()[book.id!]">
          <app-chevron-left />
        </span>
      </div>
        @if (expanded()[book.id!]) {  
                <div class="book-details">
        <h3>By: {{ book.author }}</h3>        
        <p>Status: {{ book.status }}</p>
        <p>{{ book.notes }}</p>
              </div>
        }

    </div>
  }
  <button type="button" (click)="showForm()">Add Book</button>
</div>
@if (showDeleteConfirm()) {
  <app-delete-confirm [book]="activeBook()"
  (closeDeleteEvent)="showDeleteConfirm.set(false)" 
  (confirmDeleteEvent)="handleDelete()"/>
}
