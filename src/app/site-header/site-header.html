<div class="container">
  <div class="left">
    <img class="logo" src="/assets/images/logo.png" alt="Logo" routerLink="/home" />
  </div>
  <div class="right">
    <a routerLink="/home">Home</a>
    <a routerLink="/about">About Me</a>
    <div class="submenu">
      <a routerLink="/projects">Projects</a>
      <div class="submenu-items">
        <a routerLink="/projects/calendar">Calendar</a>
        <a routerLink="/projects/weather">Weather</a>
        <a routerLink="/projects/recipe-box-list">Recipe Box</a>
      </div>
    </div>
  </div>

  <div class="mobile-menu" (click)="menuOpen.set(true)" [class.hidden]="menuOpen()">
    <app-hamburger></app-hamburger>
  </div>
  <div id="mobile-dropdown" class="mobile-dropdown" [class.open]="menuOpen()">
    <button class="close-row" type="button" (click)="menuOpen.set(false)">
      <app-x-mark></app-x-mark>
    </button>
    <a routerLink="/home" (click)="handleMenuClick()">Home</a>
    <a routerLink="/about" (click)="handleMenuClick()">About Me</a>
    <div class="mobile-submenu">
      <button type="button" (click)="handleProjectsClick()" class="mobile-submenu-toggle">
        Projects
        <span class="arrow" [class.open]="projectsOpen()">▾</span>
      </button>
      <div class="mobile-submenu-items" [class.open]="projectsOpen()">
        <a routerLink="/projects/calendar" (click)="handleMenuClick()">Calendar</a>
        <a routerLink="/projects/weather" (click)="handleMenuClick()">Weather</a>
        <a routerLink="/projects/recipe-box-list" (click)="handleMenuClick()">Recipe Box</a>
      </div>
    </div>
  </div>
</div>
@if (authService.currentUser() == null) {
  <div class="login-banner auth-banner">
    <a class="hover-button" routerLink="/login">Login</a>
    <a class="hover-button" routerLink="/register">Register</a>
  </div>
}
<div>
  @if (authService.currentUser()) {
    <div class="user-banner auth-banner">
      <span>Welcome, {{ authService.currentUser()?.username }}</span>
      <div (click)="logout()">Logout</div>
    </div>
  }
</div>
